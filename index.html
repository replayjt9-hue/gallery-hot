<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Smart Wallpapers</title>

  <link rel="stylesheet" href="css/style-Wallpapers.css">

</head>

<body>

<!-- =========================
NAVBAR
========================= -->

<header class="navbar">

  <div class="logo">
    Smart <span>Wallpapers</span>
  </div>

  <nav class="nav-links">

    <a href="Hollywood/Hollywood.html">
      Hollywood
    </a>

    <a href="Chinese/Chinese.html">
      Chinese
    </a>

    <a href="Tamil/Tamil.html">
      Tamil
    </a>

  </nav>

</header>



<!-- =========================
HERO SECTION
========================= -->

<section class="hero">

  <h1>
    Welcome To Smart Wallpapers
  </h1>

  <p>
    Select Your Favorite Gallery
  </p>

</section>



<!-- =========================
MAIN CATEGORY SECTION
========================= -->

<section class="tools-section">

  <h2 class="section-title">
    🔥 Wallpaper Categories
  </h2>

  <div class="tools-grid">

    <!-- =========================
    HOLLYWOOD
    ========================= -->

    <div class="card">

      <img src="images/Hollywood/hollywood cover.jpg" alt="Hollywood">

      <div class="card-title">
        🎬 Hollywood Gallery
      </div>

      <a class="open-btn" href="Hollywood/Hollywood.html">
        Open Gallery
      </a>

    </div>



    <!-- =========================
    CHINESE
    ========================= -->

    <div class="card">

      <img src="images/Chinese/chinese-cover.jpg" alt="Chinese">

      <div class="card-title">
        🐉 Chinese Gallery
      </div>

      <a class="open-btn" href="Chinese/Chinese.html">
        Open Gallery
      </a>

    </div>



    <!-- =========================
    TAMIL
    ========================= -->

    <div class="card">

      <img src="images/Tamil/tamil-cover.jpg" alt="Tamil">

      <div class="card-title">
        🎥 Tamil Gallery
      </div>

      <a class="open-btn" href="Tamil/Tamil.html">
        Open Gallery
      </a>

    </div>

  </div>

</section>



<!-- =========================
FOOTER
========================= -->

<footer class="stp-footer">

  <div class="stp-footer-bottom">

    <p>
      © 2026 Smart Wallpapers — All Rights Reserved
    </p>

  </div>

</footer>



<script src="js/script.js"></script>

</body>
</html>
